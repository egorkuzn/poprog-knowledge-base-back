openapi: 3.1.0
info:
  title: POPROG Knowledge Base API
  version: v1
  description: API для работы с публикациями, студенческими работами, загрузкой документов и полнотекстовым поиском.
tags:
  - name: Публикации
    description: Операции для управления публикациями
  - name: Студенческие работы
    description: Операции для управления студенческими работами
  - name: Поиск
    description: Полнотекстовый поиск по публикациям и студенческим работам
  - name: ИИ-ассистент
    description: Операции для общения с ИИ-ассистентом через GigaChat
  - name: Меню проектов
    description: Операции для получения и редактирования метаданных hover-меню раздела Проекты
paths:
  /api/projects/menu:
    get:
      tags:
        - Меню проектов
      summary: Получить метаданные меню проектов
      description: Возвращает полную структуру hover-меню раздела Проекты: секции, CTA, карточки и промо-блоки.
      operationId: getProjectsMenu
      responses:
        "200":
          description: Метаданные меню успешно получены
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMenuResponse"
  /api/projects/menu/sections:
    post:
      tags:
        - Меню проектов
      summary: Создать секцию меню проектов
      operationId: createProjectMenuSection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectMenuSectionRequest"
      responses:
        "201":
          description: Секция успешно создана
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMenuSectionResponse"
        "400":
          description: Некорректные входные данные
        "409":
          description: Секция с таким hash уже существует
  /api/projects/menu/sections/{id}:
    put:
      tags:
        - Меню проектов
      summary: Обновить секцию меню проектов
      operationId: updateProjectMenuSection
      parameters:
        - $ref: "#/components/parameters/EntityId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectMenuSectionRequest"
      responses:
        "200":
          description: Секция успешно обновлена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMenuSectionResponse"
        "404":
          description: Секция не найдена
        "409":
          description: Секция с таким hash уже существует
    delete:
      tags:
        - Меню проектов
      summary: Удалить секцию меню проектов
      operationId: deleteProjectMenuSection
      parameters:
        - $ref: "#/components/parameters/EntityId"
      responses:
        "204":
          description: Секция успешно удалена
        "404":
          description: Секция не найдена
  /api/projects/menu/items:
    post:
      tags:
        - Меню проектов
      summary: Создать карточку меню проектов
      operationId: createProjectMenuItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectMenuItemRequest"
      responses:
        "201":
          description: Карточка успешно создана
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMenuItemResponse"
        "404":
          description: Секция не найдена
  /api/projects/menu/items/{id}:
    put:
      tags:
        - Меню проектов
      summary: Обновить карточку меню проектов
      operationId: updateProjectMenuItem
      parameters:
        - $ref: "#/components/parameters/EntityId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectMenuItemRequest"
      responses:
        "200":
          description: Карточка успешно обновлена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMenuItemResponse"
        "404":
          description: Секция или карточка не найдены
    delete:
      tags:
        - Меню проектов
      summary: Удалить карточку меню проектов
      operationId: deleteProjectMenuItem
      parameters:
        - $ref: "#/components/parameters/EntityId"
      responses:
        "204":
          description: Карточка успешно удалена
        "404":
          description: Карточка не найдена
  /api/projects/menu/promos:
    post:
      tags:
        - Меню проектов
      summary: Создать промо-блок меню проектов
      operationId: createProjectMenuPromo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectMenuPromoRequest"
      responses:
        "201":
          description: Промо-блок успешно создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMenuPromoResponse"
        "404":
          description: Секция не найдена
  /api/projects/menu/promos/{id}:
    put:
      tags:
        - Меню проектов
      summary: Обновить промо-блок меню проектов
      operationId: updateProjectMenuPromo
      parameters:
        - $ref: "#/components/parameters/EntityId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectMenuPromoRequest"
      responses:
        "200":
          description: Промо-блок успешно обновлен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMenuPromoResponse"
        "404":
          description: Секция или промо-блок не найдены
    delete:
      tags:
        - Меню проектов
      summary: Удалить промо-блок меню проектов
      operationId: deleteProjectMenuPromo
      parameters:
        - $ref: "#/components/parameters/EntityId"
      responses:
        "204":
          description: Промо-блок успешно удален
        "404":
          description: Промо-блок не найден
  /api/projects/menu/resources/upload:
    post:
      tags:
        - Меню проектов
      summary: Загрузить ресурс для меню проектов
      operationId: uploadProjectMenuResource
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Ресурс успешно загружен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMenuResourceUploadResponse"
  /api/assistant/chat:
    post:
      tags:
        - ИИ-ассистент
      summary: Отправить сообщение в чат с ИИ-ассистентом
      description: Принимает новые сообщения для диалога, при наличии chatId подмешивает сохраненную историю, отправляет запрос в GigaChat и возвращает ответ ассистента.
      operationId: assistantChat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiAssistantChatRequest"
      responses:
        "200":
          description: Ответ ИИ-ассистента успешно получен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiAssistantChatResponse"
        "400":
          description: Некорректные входные данные
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Диалог не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "503":
          description: Интеграция с GigaChat временно недоступна
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /api/assistant/chats/{chatId}/messages:
    get:
      tags:
        - ИИ-ассистент
      summary: Получить историю диалога с ИИ-ассистентом
      description: Возвращает сохраненную историю сообщений указанного диалога в хронологическом порядке.
      operationId: getAssistantChatHistory
      parameters:
        - name: chatId
          in: path
          required: true
          description: Идентификатор диалога
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: История диалога успешно получена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatHistoryResponse"
        "404":
          description: Диалог не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /api/publications/grouped:
    get:
      tags:
        - Публикации
      summary: Получить публикации, сгруппированные по годам
      description: Возвращает список публикаций в формате для фронтенда, сгруппированный по году публикации.
      operationId: getGroupedPublications
      responses:
        "200":
          description: Список публикаций успешно получен
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicationsByDateDto"
  /api/publications:
    post:
      tags:
        - Публикации
      summary: Создать публикацию
      description: Создает новую запись публикации.
      operationId: createPublication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicationCreateUpdateRequest"
      responses:
        "201":
          description: Публикация успешно создана
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationResponse"
        "400":
          description: Некорректные входные данные
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /api/publications/upload:
    post:
      tags:
        - Публикации
      summary: Создать публикацию с документом
      description: Сохраняет документ в файловое хранилище, формирует публичную ссылку и затем создает запись публикации.
      operationId: uploadPublication
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PublicationUploadMultipartRequest"
      responses:
        "201":
          description: Публикация с документом успешно создана
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationResponse"
        "400":
          description: Некорректные входные данные
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /api/publications/{id}:
    put:
      tags:
        - Публикации
      summary: Обновить публикацию
      description: Обновляет существующую публикацию по её идентификатору.
      operationId: updatePublication
      parameters:
        - $ref: "#/components/parameters/EntityId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicationCreateUpdateRequest"
      responses:
        "200":
          description: Публикация успешно обновлена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationResponse"
        "400":
          description: Некорректные входные данные
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Публикация не найдена
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
    delete:
      tags:
        - Публикации
      summary: Удалить публикацию
      description: Удаляет публикацию по её идентификатору.
      operationId: deletePublication
      parameters:
        - $ref: "#/components/parameters/EntityId"
      responses:
        "204":
          description: Публикация успешно удалена
        "404":
          description: Публикация не найдена
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /api/student-works/grouped:
    get:
      tags:
        - Студенческие работы
      summary: Получить студенческие работы, сгруппированные по типу проекта
      description: Возвращает список работ в формате для фронтенда, сгруппированный по типу проекта.
      operationId: getGroupedStudentWorks
      responses:
        "200":
          description: Список работ успешно получен
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorksByProjectTypeDto"
  /api/student-works:
    post:
      tags:
        - Студенческие работы
      summary: Создать студенческую работу
      description: Создает новую запись студенческой работы и привязывает её к типу проекта по hash.
      operationId: createStudentWork
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentWorkCreateUpdateRequest"
      responses:
        "201":
          description: Работа успешно создана
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentWorkResponse"
        "400":
          description: Некорректные входные данные
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Тип проекта не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /api/student-works/upload:
    post:
      tags:
        - Студенческие работы
      summary: Создать студенческую работу с документом
      description: Сохраняет документ в файловое хранилище, формирует публичную ссылку и затем создает запись студенческой работы.
      operationId: uploadStudentWork
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/StudentWorkUploadMultipartRequest"
      responses:
        "201":
          description: Студенческая работа с документом успешно создана
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentWorkResponse"
        "400":
          description: Некорректные входные данные
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Тип проекта не найден
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /api/student-works/{id}:
    put:
      tags:
        - Студенческие работы
      summary: Обновить студенческую работу
      description: Обновляет существующую работу по идентификатору.
      operationId: updateStudentWork
      parameters:
        - $ref: "#/components/parameters/EntityId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentWorkCreateUpdateRequest"
      responses:
        "200":
          description: Работа успешно обновлена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentWorkResponse"
        "400":
          description: Некорректные входные данные
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Работа или тип проекта не найдены
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
    delete:
      tags:
        - Студенческие работы
      summary: Удалить студенческую работу
      description: Удаляет работу по идентификатору.
      operationId: deleteStudentWork
      parameters:
        - $ref: "#/components/parameters/EntityId"
      responses:
        "204":
          description: Работа успешно удалена
        "404":
          description: Работа не найдена
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /api/search:
    get:
      tags:
        - Поиск
      summary: Найти материалы по текстовому запросу
      description: Ищет по авторам, теме, описанию публикации и контексту группы. Поиск начинает возвращать результаты при вводе от 3 символов и поддерживает частичные совпадения. Возвращает смешанный список публикаций и студенческих работ.
      operationId: search
      parameters:
        - name: q
          in: query
          required: true
          description: Текстовый поисковый запрос. Результаты начинают возвращаться при вводе от 3 символов.
          schema:
            type: string
            minLength: 1
        - name: limit
          in: query
          required: false
          description: Максимальное количество результатов, от 1 до 100
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Результаты поиска успешно получены
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
components:
  parameters:
    EntityId:
      name: id
      in: path
      required: true
      description: Идентификатор сущности
      schema:
        type: integer
        format: int64
        minimum: 1
  schemas:
    AiAssistantChatRequest:
      type: object
      required:
        - messages
      properties:
        chatId:
          type:
            - string
            - "null"
          format: uuid
        messages:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/AiAssistantChatMessageRequest"
    AiAssistantChatMessageRequest:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum:
            - system
            - user
            - assistant
        content:
          type: string
          minLength: 1
    AiAssistantChatResponse:
      type: object
      required:
        - chatId
        - content
        - model
      properties:
        chatId:
          type: string
          format: uuid
        content:
          type: string
        model:
          type: string
        finishReason:
          type:
            - string
            - "null"
        promptTokens:
          type:
            - integer
            - "null"
        completionTokens:
          type:
            - integer
            - "null"
        totalTokens:
          type:
            - integer
            - "null"
    ChatHistoryResponse:
      type: object
      required:
        - chatId
        - messages
      properties:
        chatId:
          type: string
          format: uuid
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatHistoryMessageResponse"
    ChatHistoryMessageResponse:
      type: object
      required:
        - id
        - role
        - content
        - createdAt
      properties:
        id:
          type: integer
          format: int64
        role:
          type: string
          enum:
            - system
            - user
            - assistant
        content:
          type: string
        createdAt:
          type: string
          format: date-time
    ProjectMenuResponse:
      type: object
      required:
        - title
        - sections
      properties:
        title:
          type: string
        sections:
          type: array
          items:
            $ref: "#/components/schemas/ProjectMenuSectionResponse"
    ProjectMenuSectionResponse:
      type: object
      required:
        - id
        - hash
        - title
        - description
        - cta
        - sortOrder
        - items
        - promos
      properties:
        id:
          type: integer
          format: int64
        hash:
          type: string
        title:
          type: string
        description:
          type: string
        cta:
          $ref: "#/components/schemas/LinkResponse"
        sortOrder:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectMenuItemResponse"
        promos:
          type: array
          items:
            $ref: "#/components/schemas/ProjectMenuPromoResponse"
    ProjectMenuItemResponse:
      type: object
      required:
        - id
        - sectionId
        - title
        - description
        - url
        - highlighted
        - sortOrder
      properties:
        id:
          type: integer
          format: int64
        sectionId:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        url:
          type: string
        imageUrl:
          type:
            - string
            - "null"
        highlighted:
          type: boolean
        sortOrder:
          type: integer
    ProjectMenuPromoResponse:
      type: object
      required:
        - id
        - sectionId
        - title
        - description
        - url
        - imageUrl
        - sortOrder
      properties:
        id:
          type: integer
          format: int64
        sectionId:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        url:
          type: string
        imageUrl:
          type: string
        sortOrder:
          type: integer
    LinkResponse:
      type: object
      required:
        - title
        - url
      properties:
        title:
          type: string
        url:
          type: string
    ProjectMenuSectionRequest:
      type: object
      required:
        - hash
        - title
        - description
        - ctaTitle
        - ctaUrl
        - sortOrder
      properties:
        hash:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        ctaTitle:
          type: string
          minLength: 1
        ctaUrl:
          type: string
          minLength: 1
        sortOrder:
          type: integer
    ProjectMenuItemRequest:
      type: object
      required:
        - sectionId
        - title
        - description
        - url
        - highlighted
        - sortOrder
      properties:
        sectionId:
          type: integer
          format: int64
        title:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        url:
          type: string
          minLength: 1
        imageUrl:
          type:
            - string
            - "null"
        highlighted:
          type: boolean
        sortOrder:
          type: integer
    ProjectMenuPromoRequest:
      type: object
      required:
        - sectionId
        - title
        - description
        - url
        - imageUrl
        - sortOrder
      properties:
        sectionId:
          type: integer
          format: int64
        title:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        url:
          type: string
          minLength: 1
        imageUrl:
          type: string
          minLength: 1
        sortOrder:
          type: integer
    ProjectMenuResourceUploadResponse:
      type: object
      required:
        - resourceUrl
      properties:
        resourceUrl:
          type: string
    PublicationModelDto:
      type: object
      required:
        - authors
        - theme
        - published
        - link
      properties:
        authors:
          type: string
        theme:
          type: string
        published:
          type: string
        link:
          type: string
    PublicationsByDateDto:
      type: object
      required:
        - date
        - publications
      properties:
        date:
          type: string
